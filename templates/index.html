<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College AI Chatbot Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <i class="fas fa-graduation-cap"></i>
                <h1>College AI Assistant</h1>
                <p>Your Personal Admission Guide</p>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-container">
            <div id="chatbox" class="chatbox">
                <div class="welcome-message">
                    <i class="fas fa-robot"></i>
                    <h3>Welcome to College AI Assistant!</h3>
                    <p>Ask me about:</p>
                    <ul class="quick-links">
                        <li><i class="fas fa-book"></i> Courses & Programs</li>
                        <li><i class="fas fa-dollar-sign"></i> Fees & Scholarships</li>
                        <li><i class="fas fa-calendar"></i> Class Schedule</li>
                        <li><i class="fas fa-user-check"></i> Admission Process</li>
                    </ul>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="msg" 
                        placeholder="Ask about courses, fees, admission..." 
                        autocomplete="off"
                        onkeypress="if(event.key==='Enter') send();"
                    >
                    <button onclick="send()" class="send-btn">
                        <i class="fas fa-paper-plane"></i> Send
                    </button>
                </div>
                <small class="help-text">💡 Try: "What courses do you offer?" or "How much is BCA fee?"</small>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <button class="quick-btn" onclick="sendQuickMessage('What courses do you offer?')">
                <i class="fas fa-book"></i> Courses
            </button>
            <button class="quick-btn" onclick="sendQuickMessage('What are the fees?')">
                <i class="fas fa-tag"></i> Fees
            </button>
            <button class="quick-btn" onclick="sendQuickMessage('How to apply for admission?')">
                <i class="fas fa-clipboard-list"></i> Admission
            </button>
            <button class="quick-btn" onclick="sendQuickMessage('What is the class schedule?')">
                <i class="fas fa-clock"></i> Schedule
            </button>
        </div>
    </div>

    <script>
        // Send message function
        function send() {
            let msg = document.getElementById("msg").value.trim();

            // Validate input
            if (msg === "") {
                alert("Please enter a message");
                return;
            }

            // Add user message to chatbox
            addMessage("You", msg, "user");

            // Clear input field
            document.getElementById("msg").value = "";
            document.getElementById("msg").focus();

            // Send to server
            fetch("/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: msg })
            })
            .then(res => res.json())
            .then(data => {
                console.log('Bot response:', data.reply);
                addMessage("Bot", data.reply, "bot");
            })
            .catch(error => {
                console.error("Error:", error);
                addMessage("Bot", "Sorry, there was an error. Please try again.", "bot");
            });
        }

        // Add message to chatbox
        function addMessage(sender, message, type) {
            const chatbox = document.getElementById("chatbox");
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${type}-message`;

            const senderSpan = document.createElement("span");
            senderSpan.className = "message-sender";
            senderSpan.textContent = sender;

            const textSpan = document.createElement("span");
            textSpan.className = "message-text";
            if (type === "bot") {
                textSpan.innerHTML = message;
            } else {
                textSpan.textContent = message;
            }

            messageDiv.appendChild(senderSpan);
            messageDiv.appendChild(textSpan);
            chatbox.appendChild(messageDiv);

            // Auto scroll to bottom
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        // Quick message function
        function sendQuickMessage(message) {
            document.getElementById("msg").value = message;
            send();
        }

        // Focus on input when page loads
        window.addEventListener("load", function() {
            document.getElementById("msg").focus();
            // Add welcome message from bot
            addMessage("Bot", "👋 Welcome to College AI Assistant! I'm here to help you with information about our courses, fees, schedules, and admission process. What would you like to know?", "bot");
        });
    </script>
</body>

</html>
